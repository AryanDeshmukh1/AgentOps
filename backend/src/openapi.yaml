openapi: 3.0.3
info:
  title: AgentOps API
  version: 0.2.0
  description: |
    Multi-agent CI/CD orchestrator: review, test, approval, blue/green deploy,
    incident detection and AI-driven root cause analysis.

    All list endpoints support cursor-based pagination via `?cursor=` and `?limit=`.
servers:
  - url: http://localhost:4000
    description: Local dev

paths:
  /api/health:
    get:
      summary: Service liveness check
      responses:
        '200':
          description: Service is healthy
  /api/health/deep:
    get:
      summary: Service + dependencies health
      responses:
        '200':
          description: Detailed health
  /api/pipelines:
    get:
      summary: List pipelines (paginated, filterable)
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [running, complete, blocked, awaiting_approval, failed] } }
        - { name: repo, in: query, schema: { type: string } }
        - { name: risk_level, in: query, schema: { type: string, enum: [auto, soft, hard] } }
      responses:
        '200':
          description: Paginated pipeline list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/pipelines/{id}/decisions:
    get:
      summary: Get all agent decisions for a pipeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Agent decisions list
  /api/approvals/pending:
    get:
      summary: List pending approvals
      responses:
        '200':
          description: Pending approvals list
  /api/approvals/{pipelineId}/{approvalId}:
    get:
      summary: Get one approval
      parameters:
        - { name: pipelineId, in: path, required: true, schema: { type: string } }
        - { name: approvalId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Approval record
        '404':
          $ref: '#/components/responses/NotFound'
  /api/approvals/{pipelineId}/{approvalId}/approve:
    post:
      summary: Approve an approval request
      parameters:
        - { name: pipelineId, in: path, required: true, schema: { type: string } }
        - { name: approvalId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approved_by: { type: string }
                comment: { type: string }
      responses:
        '200': { description: Approved }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/approvals/{pipelineId}/{approvalId}/reject:
    post:
      summary: Reject an approval request
      parameters:
        - { name: pipelineId, in: path, required: true, schema: { type: string } }
        - { name: approvalId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rejected_by: { type: string }
                comment: { type: string }
      responses:
        '200': { description: Rejected }
        '400': { $ref: '#/components/responses/BadRequest' }
  /api/deployments:
    get:
      summary: List recent deployments
      responses:
        '200': { description: Deployment list }
  /api/deployments/{pipelineId}/{deploymentId}:
    get:
      summary: Get one deployment
      parameters:
        - { name: pipelineId, in: path, required: true, schema: { type: string } }
        - { name: deploymentId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deployment record }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/deployments/{pipelineId}/{deploymentId}/events:
    get:
      summary: Full audit trail for a deployment
      parameters:
        - { name: pipelineId, in: path, required: true, schema: { type: string } }
        - { name: deploymentId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Event list }
  /api/deployments/{pipelineId}/{deploymentId}/rollback:
    post:
      summary: Manually rollback a promoted deployment
      parameters:
        - { name: pipelineId, in: path, required: true, schema: { type: string } }
        - { name: deploymentId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                triggered_by: { type: string }
                reason: { type: string }
      responses:
        '200': { description: Rolled back }
        '400': { $ref: '#/components/responses/BadRequest' }
  /api/events/emit:
    post:
      summary: Manually broadcast a WebSocket event (testing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, type]
              properties:
                channel: { type: string, enum: [pipelines, approvals, deployments, incidents] }
                type: { type: string }
                payload: { type: object }
                source: { type: string }
      responses:
        '200': { description: Broadcast accepted }
  /api/events/agent:
    post:
      summary: Receive an event from an agent (internal)
      responses:
        '200': { description: Received and rebroadcast }
  /api/events/stats:
    get:
      summary: Subscriber counts per channel
      responses:
        '200': { description: Channel stats }

components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        items: { type: array, items: { type: object } }
        count: { type: integer }
        next_cursor: { type: string, nullable: true }
    Error:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
        request_id: { type: string }
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: State conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }